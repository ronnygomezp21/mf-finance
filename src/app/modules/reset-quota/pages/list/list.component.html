<div class="mt-3 px-3">
  <!-- Mensaje de resultado -->
  <div *ngIf="resetMessage" class="alert mb-3"
    [ngClass]="{'alert-success': resetMessageType === 'success', 'alert-danger': resetMessageType === 'error'}">
    {{ resetMessage }}
    <button type="button" class="btn-close float-end" (click)="resetMessage = ''"></button>
  </div>

  <!-- Botón de reinicio -->
  <!-- <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">Proveedores Ocasionales</h5>
    <button class="btn btn-warning" (click)="openResetDialog()" [disabled]="isResetting">
      <i class="bi bi-arrow-clockwise me-1"></i>
      {{ isResetting ? 'Procesando...' : 'Reinicio de Cupo' }}
    </button>
  </div> -->

  <!-- Tabla -->
  <mf-core-shared-table [total]="total" [page]="page" [limit]="limit" [tableColumns]="tableColumns"
    [tableData]="suppliers" (evenEmitterButtonAdd)="openResetDialog()" addButton="Reiniciar Cupo"
    (limitAction)="onLimitTermChange($event)" (pageNumberAction)="get($event)"
    (searchTermEvent)="onSearchTermChange($event)">
  </mf-core-shared-table>

  <!-- Diálogo de confirmación -->
  <div *ngIf="showConfirmDialog" class="modal-backdrop-custom">
    <div class="modal-dialog-custom">
      <div class="modal-content-custom">
        <div class="modal-header-custom">
          <h5>Confirmar Reinicio de Cupos</h5>
        </div>
        <div class="modal-body-custom">
          <p>Este proceso reinicia los cupos y valores facturados del proveedor, ¿desea continuar?</p>
        </div>
        <div class="modal-footer-custom">
          <button class="btn btn-secondary" (click)="cancelReset()">No</button>
          <button class="btn btn-primary" (click)="confirmReset()">Sí</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Diálogo de año -->
  <div *ngIf="showYearDialog" class="modal-backdrop-custom">
    <div class="modal-dialog-custom">
      <div class="modal-content-custom">
        <div class="modal-header-custom">
          <h5>Año de Reinicio</h5>
        </div>
        <div class="modal-body-custom">
          <p>Se reiniciarán los cupos del año <strong>{{ resetYear }}</strong>.</p>
        </div>
        <div class="modal-footer-custom">
          <button class="btn btn-secondary" (click)="cancelReset()">Cancelar</button>
          <button class="btn btn-warning" (click)="executeReset()">Continuar</button>
        </div>
      </div>
    </div>
  </div>
</div>
